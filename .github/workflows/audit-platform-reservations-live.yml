name: Audit platform reservations (live)

on:
  workflow_dispatch:

concurrency:
  group: audit-platform-reservations-live
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Query recent platform reservations
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          DB_CONTAINER="$(ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" \
            "docker ps --format '{{.Names}}' | grep supabase-db | head -1")"
          DB_CONTAINER="${DB_CONTAINER//$'\r'/}"
          if [ -z "${DB_CONTAINER}" ]; then
            echo "::error::Supabase-DB-Container nicht gefunden."
            exit 1
          fi
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" \
            "docker exec ${DB_CONTAINER} psql -U postgres -v ON_ERROR_STOP=1 -c \"
          SELECT
            r.reservation_number,
            r.starts_at,
            res.timezone,
            to_char(r.starts_at AT TIME ZONE res.timezone, 'DD.MM.YYYY HH24:MI') AS restaurant_local,
            r.created_at,
            r.created_by_profile_id IS NULL AS guest_booking,
            LEFT(r.notes, 40) AS notes_preview
          FROM reservations r
          JOIN restaurants res ON res.id = r.restaurant_id
          WHERE r.starts_at >= now() - interval '30 days'
            AND (r.terms_accepted = true OR r.guest_pin IS NOT NULL)
          ORDER BY r.created_at DESC
          LIMIT 15;
          \""
