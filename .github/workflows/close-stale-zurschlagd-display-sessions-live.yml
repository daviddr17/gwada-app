name: Close stale zurschlagd display sessions live

on:
  workflow_dispatch:
  repository_dispatch:
    types: [close-stale-zurschlagd-display-sessions-live]

concurrency:
  group: close-stale-zurschlagd-display-sessions-live
  cancel-in-progress: false

jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Close stale open display sessions
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/run-live-sql-ci.sh scripts/close-stale-zurschlagd-display-sessions-live.sql
