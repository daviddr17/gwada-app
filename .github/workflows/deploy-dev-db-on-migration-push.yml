# Dev-DB-Migrationen per Push (main + cursor/*), weil workflow_dispatch für den Agenten 403 ist.
name: Deploy DB dev (migration push)

on:
  push:
    branches:
      - main
      - "cursor/**"
    paths:
      - "supabase/migrations/**"
      - ".github/workflows/deploy-dev-db-on-migration-push.yml"

concurrency:
  group: deploy-dev-db
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Apply dev DB migrations
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          set -euo pipefail
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          bash scripts/deploy-db-dev-ci.sh
