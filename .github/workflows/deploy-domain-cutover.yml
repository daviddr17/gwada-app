name: Deploy domain cutover

on:
  workflow_dispatch:
    inputs:
      redirect_new:
        description: 301 redirect new.gwada.app → gwada.app
        required: false
        type: boolean
        default: true

concurrency:
  group: deploy-domain-cutover
  cancel-in-progress: false

jobs:
  cutover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Domain cutover on VPS (SSH)
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GWADA_GITHUB_DEPLOY_TOKEN }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen in GitHub Repository Secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          export GITHUB_DEPLOY_TOKEN
          args=""
          if [ "${{ inputs.redirect_new }}" = "true" ]; then
            args="--redirect-new"
          fi
          bash scripts/deploy-domain-cutover.sh ${args}
