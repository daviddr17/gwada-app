name: Deploy app live

on:
  push:
    branches: [main]

concurrency:
  group: deploy-live-app
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy on VPS (SSH)
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "LIVE_SSH_KEY / LIVE_VPS_HOST nicht gesetzt — übersprungen."
            echo "Hinweis: Coolify „finished“ tauscht den Container nicht zuverlässig."
            echo "GitHub Secrets LIVE_SSH_KEY + LIVE_VPS_HOST hinterlegen oder lokal: npm run deploy:app:live"
            exit 0
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/deploy-app-live.sh "${{ github.sha }}"
