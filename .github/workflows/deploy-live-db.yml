name: Deploy DB live

on:
  workflow_dispatch:
    inputs:
      install_dev_pubkey:
        description: Optional — öffentlicher SSH-Key für lokales deploy:live (eine Zeile)
        required: false
        default: ""
  repository_dispatch:
    types: [deploy-live-db]

concurrency:
  group: deploy-live-db
  cancel-in-progress: false

jobs:
  resolve-ref:
    name: Resolve deploy ref
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.params.outputs.ref }}
      install_dev_pubkey: ${{ steps.params.outputs.install_dev_pubkey }}
    steps:
      - id: params
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            REF="${{ github.event.client_payload.ref }}"
            PUBKEY="${{ github.event.client_payload.install_dev_pubkey }}"
          else
            REF="${{ github.ref_name }}"
            PUBKEY="${{ inputs.install_dev_pubkey }}"
          fi
          REF="${REF:-main}"
          echo "ref=${REF}" >> "$GITHUB_OUTPUT"
          echo "install_dev_pubkey=${PUBKEY}" >> "$GITHUB_OUTPUT"

  migrate:
    needs: resolve-ref
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen in GitHub Repository Secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true
          echo "VPS erreichbar unter: ${LIVE_VPS_HOST}"
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" \
            "echo Remote-IPs: \$(hostname -I | tr -s ' ')"

      - name: Install dev SSH pubkey (optional)
        if: needs.resolve-ref.outputs.install_dev_pubkey != ''
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          DEV_PUBKEY: ${{ needs.resolve-ref.outputs.install_dev_pubkey }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" bash -s -- "${DEV_PUBKEY}" <<'REMOTE'
          set -euo pipefail
          key="$1"
          auth="${HOME}/.ssh/authorized_keys"
          mkdir -p "${HOME}/.ssh"
          chmod 700 "${HOME}/.ssh"
          touch "${auth}"
          chmod 600 "${auth}"
          tmp="${auth}.gwada.tmp"
          grep -vF "${key}" "${auth}" > "${tmp}" 2>/dev/null || cp "${auth}" "${tmp}" || true
          echo "${key}" >> "${tmp}"
          mv "${tmp}" "${auth}"
          echo "Dev pubkey gesetzt ($(grep -cF "${key}" "${auth}") Eintrag/Einträge)."
          REMOTE

      - name: Apply live DB migrations
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/deploy-db-live-ci.sh

      - name: Sync GITHUB_DEPLOY_TOKEN to VPS
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GWADA_GITHUB_DEPLOY_TOKEN }}
        run: |
          if [ -z "${GITHUB_DEPLOY_TOKEN}" ]; then
            echo "GWADA_GITHUB_DEPLOY_TOKEN fehlt — Token-Sync übersprungen."
            exit 0
          fi
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          bash scripts/sync-github-deploy-token-live.sh
