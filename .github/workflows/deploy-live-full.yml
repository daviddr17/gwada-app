# Vollständiges Live-Deploy (DB + App) — für Cloud-Agent per Push-Trigger.
# Manuell weiterhin: deploy-live-db.yml / deploy-live-app.yml einzeln.

name: Deploy live (full)

on:
  workflow_dispatch:
    inputs:
      force_unlock:
        description: Hängenden VPS-Deploy beenden (Lock + Prozess) und neu starten
        required: false
        type: boolean
        default: false
  push:
    branches: [main]
    paths:
      - .github/triggers/deploy-live.env

concurrency:
  group: deploy-live-full
  cancel-in-progress: false

env:
  GWADA_LIVE_APP_IMAGE_REPO: ghcr.io/daviddr17/gwada-app

jobs:
  migrate:
    name: Live DB migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - uses: supabase/setup-cli@v1
        with:
          version: 2.105.0

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen in GitHub Repository Secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Apply live DB migrations
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/deploy-db-live-ci.sh

  build:
    name: Build image (GHA)
    needs: migrate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      sha: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v5

      - name: Live build env (Supabase anon)
        id: live_env
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          LIVE_NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.LIVE_NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          bash scripts/ci-read-live-build-env.sh

      - id: meta
        run: |
          SHA="$(git rev-parse --short HEAD)"
          FULL="$(git rev-parse HEAD)"
          IMAGE="${GWADA_LIVE_APP_IMAGE_REPO}:${SHA}"
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${FULL}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.GWADA_LIVE_APP_IMAGE_REPO }}:${{ steps.meta.outputs.sha }}
            ${{ env.GWADA_LIVE_APP_IMAGE_REPO }}:${{ steps.meta.outputs.full_sha }}
          build-args: |
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ steps.live_env.outputs.anon_key }}
            NEXT_PUBLIC_SITE_URL=https://gwada.app
            NEXT_PUBLIC_SUPABASE_URL=https://gwada.app/sb
            NEXT_PUBLIC_SUPABASE_PROXY=true
            NEXT_PUBLIC_GWADA_SUPABASE_ONLY=false
            NEXT_PUBLIC_GWADA_WORKSPACE_SLUG=gwada-demo
            NEXT_PUBLIC_PASSKEY_ENABLED=true
            SUPABASE_UPSTREAM_URL=${{ steps.live_env.outputs.supabase_upstream }}
            GWADA_BUILD_SHA=${{ steps.meta.outputs.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Pull on VPS
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v5

      - name: Deploy image on VPS
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          CHANGELOG_SYNC_SECRET: ${{ secrets.CHANGELOG_SYNC_SECRET }}
          GITHUB_DEPLOY_TOKEN: ${{ secrets.GWADA_GITHUB_DEPLOY_TOKEN }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          GWADA_DEPLOY_IMAGE: ${{ needs.build.outputs.image }}
          GWADA_DEPLOY_SHA: ${{ needs.build.outputs.sha }}
          # Wie deploy-live-app.yml — PAT ohne read:packages würde GHCR mit denied abweisen.
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_PULL_USER: ${{ github.actor }}
          GWADA_SSH_BATCH: "1"
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen in GitHub Repository Secrets."
            exit 1
          fi
          if [ "${{ inputs.force_unlock }}" = "true" ]; then
            export GWADA_DEPLOY_FORCE_UNLOCK=1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          attempt=1
          max_attempts=3
          while [ "${attempt}" -le "${max_attempts}" ]; do
            echo "Deploy-Versuch ${attempt}/${max_attempts} …"
            if bash scripts/deploy-app-live.sh; then
              exit 0
            fi
            if [ "${attempt}" -eq "${max_attempts}" ]; then
              echo "::error::Deploy nach ${max_attempts} Versuchen fehlgeschlagen."
              exit 1
            fi
            echo "Deploy fehlgeschlagen — warte 30s …"
            sleep 30
            attempt=$((attempt + 1))
          done
