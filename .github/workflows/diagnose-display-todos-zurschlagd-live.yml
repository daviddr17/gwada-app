name: Diagnose display todos zurschlagd live

on:
  workflow_dispatch:
  repository_dispatch:
    types: [diagnose-display-todos-zurschlagd-live]

concurrency:
  group: diagnose-display-todos-zurschlagd-live
  cancel-in-progress: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Diagnose display todos
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/run-live-sql-ci.sh scripts/diagnose-display-todos-zurschlagd-detail.sql

      - name: Grep live app logs for display todos
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" bash <<'REMOTE'
          set -euo pipefail
          echo "=== all containers ==="
          docker ps --format '{{.Names}}\t{{.Image}}' | head -80
          echo "=== recent app logs ==="
          for name in $(docker ps --format '{{.Names}}'); do
            img="$(docker inspect -f '{{.Config.Image}}' "$name" 2>/dev/null || true)"
            case "$img" in
              *gwada-app*|*daviddr17/gwada*)
                echo "=== logs $name ($img) ==="
                docker logs --since 6h "$name" 2>&1 | grep -Ei 'display todos|todos_fetch|/api/display/todos|staff todo|Checklisten|prepare_pin|prepare_trigger|Error|ERROR' | tail -60 || true
                ;;
            esac
          done
          # also Traefik/coolify proxy access if any
          if docker ps --format '{{.Names}}' | grep -qx coolify-proxy; then
            echo "=== coolify-proxy recent display/todos ==="
            docker logs --since 6h coolify-proxy 2>&1 | grep -E 'display/todos' | tail -30 || true
          fi
          REMOTE
