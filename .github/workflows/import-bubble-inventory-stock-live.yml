name: Import Bubble inventory stock (live)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Nur Vorschau, keine DB-Schreibzugriffe
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: import-bubble-inventory-stock-live
  cancel-in-progress: false

jobs:
  import:
    name: Bubble Bestand → Live zurschlagd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install pnpm
        run: bash scripts/ensure-pnpm.sh

      - name: Install deps (supabase-js)
        run: pnpm install --frozen-lockfile

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Import Bubble inventory + open order
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          BUBBLE_API_TOKEN: ${{ secrets.BUBBLE_API_TOKEN }}
        run: |
          export GWADA_SSH_IDENTITY="${HOME}/.ssh/id_ed25519"
          export GWADA_SSH_BATCH=1
          args=()
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          bash scripts/import-bubble-inventory-stock-live.sh "${args[@]}"
