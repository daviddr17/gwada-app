name: Import Bubble staff times (live)

on:
  workflow_dispatch:
    inputs:
      date:
        description: Kalendertag (Europe/Berlin), YYYY-MM-DD
        required: true
        default: "2026-07-05"
      dry_run:
        description: Nur Vorschau, keine DB-Schreibzugriffe
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
  push:
    branches: [main]
    paths:
      - .github/triggers/import-bubble-staff-times.env

concurrency:
  group: import-bubble-staff-times-live
  cancel-in-progress: false

jobs:
  import:
    name: Bubble → Live zurschlagd
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install pnpm deps (supabase-js)
        run: pnpm install --frozen-lockfile

      - name: Resolve date and dry_run
        id: flags
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "date=${{ inputs.date }}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${{ inputs.dry_run }}" >> "$GITHUB_OUTPUT"
          else
            date="$(grep -E '^date=' .github/triggers/import-bubble-staff-times.env | cut -d= -f2- | tr -d '[:space:]' || true)"
            dry_run="$(grep -E '^dry_run=' .github/triggers/import-bubble-staff-times.env | cut -d= -f2- | tr -d '[:space:]' || true)"
            date="${date:-2026-07-05}"
            dry_run="${dry_run:-false}"
            echo "date=${date}" >> "$GITHUB_OUTPUT"
            echo "dry_run=${dry_run}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Import Bubble staff times
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
          BUBBLE_API_TOKEN: ${{ secrets.BUBBLE_API_TOKEN }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          args=("${{ steps.flags.outputs.date }}")
          if [ "${{ steps.flags.outputs.dry_run }}" = "true" ]; then
            args+=(--dry-run)
          fi
          bash scripts/import-bubble-staff-times-live.sh "${args[@]}"
