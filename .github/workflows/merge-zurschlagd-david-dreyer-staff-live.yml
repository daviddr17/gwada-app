name: Merge zurschlagd David Dreyer staff live

on:
  workflow_dispatch:
  repository_dispatch:
    types: [merge-zurschlagd-david-dreyer-staff-live]

concurrency:
  group: merge-zurschlagd-david-dreyer-staff-live
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup SSH
        env:
          LIVE_SSH_KEY: ${{ secrets.LIVE_SSH_KEY }}
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          if [ -z "${LIVE_SSH_KEY}" ] || [ -z "${LIVE_VPS_HOST}" ]; then
            echo "::error::LIVE_SSH_KEY / LIVE_VPS_HOST fehlen in GitHub Repository Secrets."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "${LIVE_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${LIVE_VPS_HOST}" >> ~/.ssh/known_hosts 2>/dev/null || true
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          ssh -i ~/.ssh/id_ed25519 -o BatchMode=yes "root@${LIVE_VPS_HOST}" true

      - name: Install psql
        run: sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client

      - name: Merge duplicate David Dreyer into owner staff
        env:
          LIVE_VPS_HOST: ${{ secrets.LIVE_VPS_HOST }}
        run: |
          export GWADA_SSH_IDENTITY=~/.ssh/id_ed25519
          export GWADA_SSH_BATCH=1
          export LIVE_VPS_HOST
          bash scripts/run-live-sql-ci.sh scripts/merge-zurschlagd-david-dreyer-staff-live.sql
