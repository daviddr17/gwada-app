name: Production cron jobs

on:
  schedule:
    # staff-shift-notifications, contact-inbox-sync
    - cron: "*/5 * * * *"
    # news-feed-sync, reviews-feed-sync
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      target:
        description: Cron endpoint (schedule uses its own mapping)
        required: false
        type: choice
        default: all
        options:
          - all
          - news-feed-sync
          - reviews-feed-sync
          - notification-deliver
          - staff-shift-notifications
          - contact-inbox-sync
          - accounting-lexoffice-sync

env:
  CRON_BASE_URL: https://new.gwada.app

jobs:
  news-feed-sync:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'news-feed-sync')) ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *')
    steps:
      - name: Call news-feed-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/news-feed-sync"

  reviews-feed-sync:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'reviews-feed-sync')) ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *')
    steps:
      - name: Call reviews-feed-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/reviews-feed-sync"

  notification-deliver:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      (inputs.target == 'all' || inputs.target == 'notification-deliver')
    steps:
      - name: Call notification-deliver
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS --max-time 130 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/notification-deliver"

  staff-shift-notifications:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'staff-shift-notifications')) ||
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
    steps:
      - name: Call staff-shift-notifications
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/staff-shift-notifications"

  contact-inbox-sync:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'contact-inbox-sync')) ||
      (github.event_name == 'schedule' && github.event.schedule == '*/5 * * * *')
    steps:
      - name: Call contact-inbox-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/contact-inbox-sync"

  accounting-lexoffice-sync:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && (inputs.target == 'all' || inputs.target == 'accounting-lexoffice-sync')) ||
      (github.event_name == 'schedule' && github.event.schedule == '*/10 * * * *')
    steps:
      - name: Call accounting-lexoffice-sync
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "CRON_SECRET not set — skipped."
            exit 0
          fi
          curl -sfS --max-time 300 \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$CRON_BASE_URL/api/cron/accounting-lexoffice-sync"
