name: GwadaPOS
options:
  bundleIdPrefix: app.gwada
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2" # iPhone + iPad
    INFOPLIST_FILE: Config/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: app.gwada.pos
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "26N959J5Q3"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: false
targets:
  GwadaPOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Sources/Assets.xcassets
        type: folder
    settings:
      base:
        PRODUCT_NAME: GwadaPOS
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_CFBundleDisplayName: Gwada POS
    info:
      path: Config/Info.plist
      properties:
        CFBundleDisplayName: Gwada POS
        CFBundleName: GwadaPOS
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSLocalNetworkUsageDescription: Gwada POS verbindet iPhone-Handgeräte mit der iPad-Kasse im lokalen WLAN.
        NSBonjourServices:
          - _gwada-pos._tcp
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        ITSAppUsesNonExemptEncryption: false
schemes:
  GwadaPOS:
    build:
      targets:
        GwadaPOS: all
    run:
      config: Debug
